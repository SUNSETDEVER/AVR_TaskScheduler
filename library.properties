name=AVR Task Scheduler
version=1.0.0
author=SUNSET
maintainer=SUNSET <973879601@qq.com>
sentence=A lightweight, polling-based task scheduler for AVR Arduino boards with FreeRTOS-like API.
paragraph=This library provides a simple yet powerful task scheduling system for AVR microcontrollers. It uses millis() for timing (no hardware timer required), supports multiple tasks with different intervals, and includes task management features like suspend/resume/delete. Perfect for projects that need to manage multiple periodic tasks without the complexity of RTOS.
category=Timing
